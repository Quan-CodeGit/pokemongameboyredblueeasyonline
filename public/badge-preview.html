<!DOCTYPE html>
<html lang="en">

      background: #1a1a2e;
      min-height: 100vh;

      flex-direction: column;
      align-items: center;

    }

      text-shadow: 2px 2px #c8a000;

    }

    .subtitle {
      color: #aaa;
      font-size: 7px;
      margin-bottom: 32px;
      letter-spacing: 1px;
    }

    /* Badge Case Container */
    .badge-case {
      background: #4a2c0a;
      border: 4px solid #8b5e1a;
      border-radius: 12px;
      padding: 24px 28px 28px;
      box-shadow:
        inset 0 2px 6px rgba(0,0,0,0.5),
        0 8px 24px rgba(0,0,0,0.6),
        0 0 0 2px #2a1800;
      position: relative;
    }

    .case-label {
      color: #c8860a;
      font-size: 7px;
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: 3px;
    }

    /* Velvet backing */
    .velvet {
      background: #1e0a3c;
      border: 2px solid #3a1a60;
      border-radius: 8px;
      padding: 20px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.6);
    }

    /* Individual Badge Slot */
    .badge-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .badge-slot:hover { transform: scale(1.05); }
    .badge-slot:active { transform: scale(0.97); }

    .badge-frame {
      width: 72px;
      height: 72px;
      background: #0d0d1a;
      border: 3px solid #333;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow:
        inset 0 2px 6px rgba(0,0,0,0.8),
        0 0 0 1px #555;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .badge-slot.earned .badge-frame {
      border-color: #f8e71c;
      box-shadow:
        inset 0 2px 6px rgba(0,0,0,0.4),
        0 0 12px rgba(248, 231, 28, 0.5),
        0 0 0 1px #c8a000;
    }

    .badge-slot.locked .badge-frame {
      filter: brightness(0.3) saturate(0);
    }

    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .badge-name {
      color: #888;
      font-size: 6px;
      text-align: center;
      max-width: 72px;
      line-height: 1.6;
      transition: color 0.2s;
    }

    .badge-slot.earned .badge-name { color: #f8e71c; }

    /* Earned star indicator */
    .earned-star {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 14px;
      height: 14px;
      background: #f8e71c;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 7px;
      color: #2a1800;
      box-shadow: 0 0 6px #f8e71c;
      font-family: Arial, sans-serif;
    }

    .badge-slot.earned .earned-star { display: flex; }

    .instructions {
      color: #555;
      font-size: 6px;
      margin-top: 20px;
      text-align: center;
      letter-spacing: 1px;
    }

    /* Badge requirement tooltip */
    .badge-req {
      color: #666;
      font-size: 5px;
      text-align: center;
      max-width: 76px;
      line-height: 1.8;
    }

    .badge-slot.earned .badge-req { color: #aaa; }

  /* ── Pixel Editor ──────────────────────────────── */
  .pixel-editor {
    margin-top: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .editor-title {
    color: #f8e71c;
    font-size: 8px;
    letter-spacing: 2px;
    text-shadow: 1px 1px #c8a000;
  }

  .editor-row {
    display: flex;
    align-items: flex-start;
    gap: 20px;
  }

  /* Color palette */

    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .palette-label {
    color: #666;
    font-size: 5px;
    letter-spacing: 1px;
    margin-bottom: 2px;
  }

  .palette-swatch {
    width: 26px;
    height: 26px;
    border: 2px solid #444;
    border-radius: 3px;
    cursor: pointer;
    position: relative;
    transition: border-color 0.1s, transform 0.1s;

  .palette-swatch.active { border-color: #f8e71c; box-shadow: 0 0 6px #f8e71c; transform: scale(1.15); }

// ─────────────────────────────────────────────────────
// RENDER EACH BADGE ONTO A CANVAS
// ─────────────────────────────────────────────────────

const PIXEL = 3; // px per grid cell → 16*3 = 48px canvas
const SIZE = 16 * PIXEL;

function renderBadge(canvas, badge, earned) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, SIZE, SIZE);

  // — Image-based badge (e.g. user drawing) —
  if (badge.imageUrl) {
    const W = canvas.width, H = canvas.height;
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      ctx.clearRect(0, 0, W, H);
      ctx.drawImage(img, 0, 0, W, H);

      // Remove background: sample top-left corner color and wipe similar pixels
      try {
        const imgData = ctx.getImageData(0, 0, W, H);
        const d = imgData.data;
        const bgR = d[0], bgG = d[1], bgB = d[2];
        for (let i = 0; i < d.length; i += 4) {
          const dr = Math.abs(d[i]   - bgR);
          const dg = Math.abs(d[i+1] - bgG);
          const db = Math.abs(d[i+2] - bgB);
          if (dr + dg + db < 80) d[i+3] = 0;
        }
        ctx.putImageData(imgData, 0, 0);
      } catch(e) {
        // CORS blocked — image shows without bg removal
      }

      if (!earned) {
        ctx.fillStyle = 'rgba(20,20,50,0.75)';
        ctx.fillRect(0, 0, W, H);
      }
      if (earned) {
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(0, 0, W, H / 3);
      }
    };
    img.src = badge.imageUrl;
    return;
  }

  // — Pixel-art badge —
  for (let row = 0; row < 16; row++) {
    for (let col = 0; col < 16; col++) {
      const val = badge.pixels[row][col];
      if (val === 0) continue;

      let color = badge.palette[val] || '#ffffff';

      // If locked, desaturate
      if (!earned) {
        color = '#333344';
      }

      ctx.fillStyle = color;
      ctx.fillRect(col * PIXEL, row * PIXEL, PIXEL, PIXEL);
    }
  }

  // Shine effect on earned badges
  if (earned) {
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(0, 0, SIZE, SIZE / 3);
  }
}

// ─────────────────────────────────────────────────────

const earned = new Set(['catcher', 'explorer']); // demo: 2 earned

  const canvas = document.createElement('canvas');
  const canvasSize = badge.imageUrl ? 72 : SIZE; // image badges fill the full frame
  canvas.width = canvasSize;
  canvas.height = canvasSize;
  canvas.style.width = canvasSize + 'px';
  canvas.style.height = canvasSize + 'px';

  renderBadge(canvas, badge, isEarned);

  const star = document.createElement('div');
  star.className = 'earned-star';
  star.textContent = '★';

  frame.appendChild(canvas);
  frame.appendChild(star);

  const name = document.createElement('div');
  name.className = 'badge-name';
  name.textContent = badge.name;

  const req = document.createElement('div');
  req.className = 'badge-req';
  req.textContent = badge.req;

  slot.appendChild(frame);
  slot.appendChild(name);
  slot.appendChild(req);
  container.appendChild(slot);

  // Open editor when clicking the evolution badge
  if (badge.id === 'evolution') {
    slot.addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('pixelGrid').scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
    return; // skip toggle for evolution badge
  }

  // Click to toggle
  slot.addEventListener('click', () => {
    const id = slot.dataset.id;
    if (earned.has(id)) {
      earned.delete(id);
      slot.classList.remove('earned');
      slot.classList.add('locked');
    } else {
      earned.add(id);
      slot.classList.add('earned');
      slot.classList.remove('locked');
    }
    renderBadge(canvas, badge, earned.has(id));
  });
});

// ─────────────────────────────────────────────────────
// PIXEL EDITOR
// ─────────────────────────────────────────────────────

const EDITOR_PALETTE = [
  { val: 0,  hex: null,      label: '⌫',          title: 'Erase (transparent)' },
  { val: 1,  hex: '#e84010', label: '',            title: 'Orange-red body'    },
  { val: 2,  hex: '#2850b0', label: '',            title: 'Blue fins / tail'   },
  { val: 3,  hex: '#150800', label: '',            title: 'Dark outline'       },
  { val: 4,  hex: '#0a0a00', label: '',            title: 'Black eye'          },
  { val: 5,  hex: '#f0d890', label: '',            title: 'Cream belly'        },
  { val: 6,  hex: '#e8b800', label: '',            title: 'Yellow whisker'     },
  { val: 7,  hex: '#f0f0f0', label: '',            title: 'Eye highlight'      },
];

const EDITOR_BADGE_PALETTE = {};
EDITOR_PALETTE.forEach(p => { if (p.hex) EDITOR_BADGE_PALETTE[p.val] = p.hex; });

// 16×16 grid state — start blank
let editorGrid = Array.from({ length: 16 }, () => new Array(16).fill(0));

// Try to seed from existing evolution badge pixels if available
const evoBadge = BADGES.find(b => b.id === 'evolution');
if (evoBadge && evoBadge.pixels) {
  editorGrid = evoBadge.pixels.map(row => [...row]);
}

let activeColor = 1;   // currently selected palette value
let isPainting  = false;

// ── Build palette swatches ────────────────────────────
const paletteEl = document.querySelector('.palette');
EDITOR_PALETTE.forEach(p => {
  const sw = document.createElement('div');
  sw.className = 'palette-swatch' + (p.val === 0 ? ' eraser' : '');
  if (p.val === activeColor) sw.classList.add('active');
  sw.title = p.title;
  if (p.hex) sw.style.background = p.hex;
  else sw.textContent = p.label;

  sw.addEventListener('click', () => {
    document.querySelectorAll('.palette-swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    activeColor = p.val;
  });
  paletteEl.appendChild(sw);
});

// ── Build 16×16 cell grid ─────────────────────────────
const gridEl = document.getElementById('pixelGrid');

function cellColor(val) {
  return EDITOR_BADGE_PALETTE[val] || '#0d0d1a';
}

const cells = [];
for (let r = 0; r < 16; r++) {
  cells[r] = [];
  for (let c = 0; c < 16; c++) {
    const cell = document.createElement('div');
    cell.className = 'px-cell';
    cell.style.background = cellColor(editorGrid[r][c]);

    cell.addEventListener('mousedown', (e) => {
      e.preventDefault();
      isPainting = true;
      paint(r, c);
    });
    cell.addEventListener('mouseenter', () => {
      if (isPainting) paint(r, c);
    });

    gridEl.appendChild(cell);
    cells[r][c] = cell;
  }
}

document.addEventListener('mouseup', () => { isPainting = false; });

function paint(r, c) {
  editorGrid[r][c] = activeColor;
  cells[r][c].style.background = cellColor(activeColor);
  refreshEditorPreview();
  refreshEvoBadge();
}

// ── Live preview canvas ───────────────────────────────
const previewCanvas = document.getElementById('editorPreviewCanvas');
const previewCtx    = previewCanvas.getContext('2d');
const PCELL = 3; // 16 * 3 = 48px

function refreshEditorPreview() {
  previewCtx.clearRect(0, 0, 48, 48);
  for (let r = 0; r < 16; r++) {
    for (let c = 0; c < 16; c++) {
      const val = editorGrid[r][c];
      if (val === 0) continue;
      previewCtx.fillStyle = EDITOR_BADGE_PALETTE[val] || '#fff';
      previewCtx.fillRect(c * PCELL, r * PCELL, PCELL, PCELL);
    }
  }
  // Shine
  previewCtx.fillStyle = 'rgba(255,255,255,0.12)';
  previewCtx.fillRect(0, 0, 48, 16);
}

// ── Sync back to the badge in the case ───────────────
function refreshEvoBadge() {
  const slot   = document.querySelector('[data-id="evolution"]');
  if (!slot) return;
  const canvas = slot.querySelector('canvas');
  if (!canvas) return;
  const fakeBadge = {
    pixels:  editorGrid,
    palette: EDITOR_BADGE_PALETTE,
  };
  renderBadge(canvas, fakeBadge, earned.has('evolution'));
}

// ── Clear ─────────────────────────────────────────────
function clearGrid() {
  editorGrid = Array.from({ length: 16 }, () => new Array(16).fill(0));
  for (let r = 0; r < 16; r++)
    for (let c = 0; c < 16; c++)
      cells[r][c].style.background = cellColor(0);
  refreshEditorPreview();
  refreshEvoBadge();
}

// ── Copy pixel data ───────────────────────────────────
function copyPixelData() {
  const lines = editorGrid.map(row => '  [' + row.join(',') + ']');
  const text  = 'pixels: [\n' + lines.join(',\n') + ',\n]';
  navigator.clipboard.writeText(text).then(() => {
    const notice = document.getElementById('copyNotice');
    notice.textContent = '✓ COPIED!';
    setTimeout(() => { notice.textContent = ''; }, 2000);
  });
}

// Initial render
refreshEditorPreview();
refreshEvoBadge();
</script>
</body>
</html>
